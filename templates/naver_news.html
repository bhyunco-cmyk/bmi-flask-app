<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네이버 증권뉴스 크롤러</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #03c75a;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #718096;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 860px;
      padding: 32px;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #btn-crawl { background: #03c75a; color: #fff; }
    #btn-download { background: #1a73e8; color: #fff; }
    #status {
      font-size: 0.9rem;
      color: #4a5568;
      margin-bottom: 16px;
      min-height: 20px;
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #ccc;
      border-top-color: #03c75a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    thead th {
      background: #f7fafc;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 2px solid #e2e8f0;
      color: #4a5568;
      font-weight: 600;
    }
    tbody tr:nth-child(even) { background: #f7fafc; }
    tbody td {
      padding: 9px 12px;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: middle;
    }
    tbody td:first-child {
      width: 50px;
      text-align: center;
      color: #718096;
      font-weight: 600;
    }
    tbody td a {
      color: #2b6cb0;
      text-decoration: none;
    }
    tbody td a:hover { text-decoration: underline; }
    .empty { text-align: center; color: #a0aec0; padding: 40px; }
    .badge {
      background: #ebf8f1;
      color: #03c75a;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <h1>📈 네이버 증권뉴스 크롤러</h1>
  <p class="subtitle">1~9 페이지의 네이버 증권뉴스를 수집하고 엑셀로 다운로드합니다.</p>

  <div class="card">
    <div class="btn-group">
      <button id="btn-crawl" onclick="startCrawl()">뉴스 수집하기</button>
      <button id="btn-download" onclick="downloadExcel()">엑셀 다운로드</button>
    </div>
    <div id="status"></div>
    <table id="news-table">
      <thead>
        <tr>
          <th>Page</th>
          <th>뉴스 제목</th>
          <th>URL</th>
        </tr>
      </thead>
      <tbody id="news-body">
        <tr><td colspan="3" class="empty">수집하기 버튼을 눌러 뉴스를 가져오세요.</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    async function startCrawl() {
      const btn = document.getElementById('btn-crawl');
      const status = document.getElementById('status');
      const tbody = document.getElementById('news-body');

      btn.disabled = true;
      status.innerHTML = '<span class="spinner"></span>1~9페이지 수집 중... (약 10~20초 소요)';
      tbody.innerHTML = '';

      try {
        const res = await fetch('/crawl');
        const data = await res.json();

        status.innerHTML = `✅ 수집 완료 — 총 <strong>${data.total}</strong>건 <span class="badge">${data.total} articles</span>`;

        const rows = data.news.map(item => `
          <tr>
            <td>${item.page}</td>
            <td>${escapeHtml(item['뉴스제목'])}</td>
            <td><a href="${escapeHtml(item['뉴스URL'])}" target="_blank" rel="noopener">링크</a></td>
          </tr>
        `).join('');
        tbody.innerHTML = rows || '<tr><td colspan="3" class="empty">데이터 없음</td></tr>';
      } catch (e) {
        status.textContent = '❌ 수집 중 오류가 발생했습니다.';
      } finally {
        btn.disabled = false;
      }
    }

    function downloadExcel() {
      const status = document.getElementById('status');
      status.innerHTML = '<span class="spinner"></span>엑셀 파일 생성 중...';
      window.location.href = '/download';
      setTimeout(() => { status.textContent = '✅ 다운로드 완료 — naver_finance_news.xlsx'; }, 3000);
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
